<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.ujjwalvivek.com/icons/logo192.png">
    <title>SVG Metro</title>
    <style>
      html,body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #0f1117; }
      object { width: 100%; height: 100%; display: block; border: 0; }
    </style>
  </head>
  <body>
    <object id="svg-metro" data="./minimetro.svg" type="image/svg+xml" aria-label="SVG Metro"></object>
    <script>
      const svg = document.getElementById("svg-metro");
      const cdn = "https://cdn.jsdelivr.net/npm/@ujjwalvivek/svg-metro@1.1.0/dist/minimetro.svg";
      svg.addEventListener("error", () => {
        if (svg.data !== cdn) svg.data = cdn;
      });
    </script>
  </body>
</html>
